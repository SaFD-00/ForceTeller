# Alembic 설정
# DB URL은 migrations/env.py가 config.settings.DATABASE_URL에서 읽으므로 여기에 두지 않는다.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

# 마이그레이션 파일명: 0001_slug 형태
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
