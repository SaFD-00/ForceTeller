[pytest]
# 테스트 디렉토리
testpaths = tests

# Python 파일 패턴
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 비동기 테스트 모드
asyncio_mode = auto

# 마커 정의
markers =
    unit: 단위 테스트
    integration: 통합 테스트 (실제 API 호출 가능)
    e2e: End-to-End 테스트
    slow: 느린 테스트

# 기본 옵션
addopts =
    -v
    --strict-markers
    --tb=short

# 커버리지 설정
[coverage:run]
source = agents,api,conversation,utils,config,manseol
omit =
    */tests/*
    */__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
