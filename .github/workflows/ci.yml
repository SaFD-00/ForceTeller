name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      # 테스트는 필수 게이트
      - name: Run tests
        run: uv run pytest -q

      # 린트·포맷은 차단 게이트 (ruff로 일원화)
      - name: Ruff
        run: uv run ruff check .

      - name: Ruff format --check
        run: uv run ruff format --check .

      # 타입 체크는 점진 강화 중이라 아직 정보성(비차단)
      - name: Mypy (non-blocking)
        run: uv run mypy .
        continue-on-error: true

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      # 디자인 규칙 가드 1 — primary(#49B6E5, 백색 대비 2.31:1)는 채움/장식 전용.
      # 텍스트·아이콘강조·포커스링·선택보더에 쓰면 AA 대비를 만족하지 못하므로 accent를 써야 한다.
      - name: Design guard - primary is fill-only
        run: |
          MATCHES=$(grep -rnE "(text|ring|border|decoration|stroke)-primary" --include="*.tsx" --include="*.ts" app components lib 2>/dev/null | grep -v "primary-foreground" || true)
          if [ -n "$MATCHES" ]; then
            echo "$MATCHES"
            echo "::error::primary(#49B6E5)는 채움/장식 전용입니다. 텍스트·링·보더·스트로크 강조에는 accent를 쓰세요."
            exit 1
          fi
          echo "OK: text/ring/border/decoration/stroke-primary 위반 0건"

      # 디자인 규칙 가드 2 — 손그림 카드 클래스(block-card/glass-card/card/glass)는
      # globals.css에서 자체 hand-drawn radius(255px 15px 225px 15px / ...)를 이미 적용한다.
      # 같은 className에 rounded-*를 더하면 그 손그림 윤곽이 조용히 무효화된다.
      - name: Design guard - no rounded-* on hand-drawn card classes
        run: |
          PATTERN='(^|[^a-zA-Z0-9-])(block-card|glass-card|card|glass)([^a-zA-Z0-9-]|$)'
          MATCHES=$(grep -rnE "$PATTERN" --include="*.tsx" app components 2>/dev/null | grep "rounded-" || true)
          if [ -n "$MATCHES" ]; then
            echo "$MATCHES"
            echo "::error::block-card/glass-card/card/glass는 자체 hand-drawn radius를 갖습니다. 같은 className에 rounded-*를 함께 쓰지 마세요."
            exit 1
          fi
          echo "OK: 손그림 카드 클래스 + rounded-* 동시 출현 0건"

      # 집계 게이트 — lint → typecheck → test → build → design-sync CSS 컴파일.
      # 로컬 `npm run gate`와 동일 정의를 재사용해 CI/로컬 드리프트를 없앤다(package.json 참조).
      - name: Gate (lint + typecheck + test + build + ds-css compile)
        run: npm run gate
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      # ── 접근성 실측 하네스 (Playwright) ───────────────────────────────────
      # lint/tsc/test/build 4게이트 중 무엇도 잡지 못하는 회귀를 잡는다:
      # 모달 포커스 트랩·inert 배경 봉쇄·overflow 복원·툴팁 Escape 해제(WCAG 1.4.13)·
      # 실렌더 색 대비·aria-label ↔ 데이터 정합. 위 Build 산출물(.next)을 그대로 재사용한다.
      #
      # 백엔드는 띄우지 않는다. 하네스는 localStorage에 mock 사주를 주입해 /result를 렌더하고,
      # 도시 검색은 프론트의 오프라인 폴백 목록으로 동작한다(로컬에서 백엔드 없는 조건으로 실측 확인).
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      - name: Start production server
        run: |
          PORT=3456 npm run start > /tmp/next-e2e.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://127.0.0.1:3456/result; then
              echo "서버 기동 완료 (${i}s)"
              exit 0
            fi
            sleep 1
          done
          echo "::error::60초 안에 프로덕션 서버가 응답하지 않았다"
          cat /tmp/next-e2e.log
          exit 1

      # 차단 게이트. 스테이징(continue-on-error) 기간에 걱정하던 ubuntu 한글 폰트
      # 폴백으로 인한 대비/요소 수 핀(EXPECT_TAB_CANDIDATES=16 등) 흔들림은 발생하지
      # 않았고, 설치·기동·실행·셀프테스트 4스텝이 연속 3회 녹색(run 30057763442,
      # 30060237322, 30062109881)을 채워 문서화된 승격 조건대로 차단으로 올렸다.
      - name: A11y harness
        run: npm run e2e

      # 하네스가 "공허하게 통과"하지 않음을 증명하는 유일한 장치.
      # A11Y_SELFTEST=1은 알려진 결함 4종(화살촉 defs 제거·aria 변조·범례 항목 삭제·% 텍스트 제거)을
      # DOM에 주입한다. 하네스가 이를 잡아 exit 1이 나와야 이 스텝이 성공한다(npm script가 종료코드를 반전).
      - name: A11y harness self-test (mutation must FAIL)
        run: npm run e2e:selftest
