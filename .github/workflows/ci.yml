name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      # 테스트는 필수 게이트
      - name: Run tests
        run: uv run pytest -q

      # 린트/포맷/타입은 아직 전면 정리 전이라 정보성(비차단)으로만 실행
      - name: Ruff (non-blocking)
        run: uv run ruff check .
        continue-on-error: true

      - name: Ruff format --check (non-blocking)
        run: uv run ruff format --check .
        continue-on-error: true

      - name: Mypy (non-blocking)
        run: uv run mypy .
        continue-on-error: true

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
